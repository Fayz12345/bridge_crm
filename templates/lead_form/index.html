<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bridge CRM Lead Form</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #f5f1e7 0%, #edf4f8 100%);
        color: #18222f;
      }
      .lead-shell {
        max-width: 760px;
        margin: 2rem auto;
        padding: 1rem;
      }
      .lead-card {
        background: rgba(255,255,255,0.92);
        border: 1px solid #dbe4ec;
        border-radius: 1rem;
        box-shadow: 0 1rem 3rem rgba(24,34,47,0.08);
      }
    </style>
  </head>
  <body>
    <div class="lead-shell">
      <div class="lead-card p-4 p-lg-5">
        <p class="text-uppercase small fw-semibold text-secondary mb-2">Bridge Wireless</p>
        <h1 class="h3 mb-2">Talk to our wholesale team</h1>
        <p class="text-secondary mb-4">Tell us what models or categories you need and our sales team will reach out.</p>
        <div id="message" class="mb-3"></div>
        <form id="lead-form" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="first_name">First Name</label>
              <input class="form-control" id="first_name" name="first_name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="last_name">Last Name</label>
              <input class="form-control" id="last_name" name="last_name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" name="email" type="email" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="phone">Phone</label>
              <input class="form-control" id="phone" name="phone">
            </div>
            <div class="col-12">
              <label class="form-label" for="company_name">Company</label>
              <input class="form-control" id="company_name" name="company_name">
            </div>
            <div class="col-12">
              <label class="form-label" for="interest">What are you looking for?</label>
              <textarea class="form-control" id="interest" name="interest" rows="5"></textarea>
            </div>
          </div>
          <button class="btn btn-primary mt-4" type="submit">Submit</button>
        </form>
      </div>
    </div>

    <script>
      const form = document.getElementById("lead-form");
      const message = document.getElementById("message");
      const mountPath = window.location.pathname.replace(/\/lead-form\/?$/, "");
      const endpoint = `${mountPath}/api/leads`;

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.innerHTML = "";

        const payload = Object.fromEntries(new FormData(form).entries());
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => ({ ok: false, errors: { form: "Unexpected response" } }));
        if (response.ok && data.ok) {
          message.innerHTML = '<div class="alert alert-success">Thanks. Our team will reach out shortly.</div>';
          form.reset();
          return;
        }

        const errors = data.errors || { form: "Unable to submit your request right now." };
        const list = Object.values(errors).map((item) => `<li>${item}</li>`).join("");
        message.innerHTML = `<div class="alert alert-danger mb-0"><ul class="mb-0 ps-3">${list}</ul></div>`;
      });
    </script>
  </body>
</html>
