<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0A2540">
    <title>Bridge CRM Lead Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        min-height: 100vh;
        font-family: 'Open Sans', sans-serif;
        background: linear-gradient(135deg, #0A2540 0%, #1E293B 100%);
        color: #333;
      }
      h1, h2, h3, .form-label {
        font-family: 'Inter', sans-serif;
      }
      .form-label { font-weight: 600; font-size: 0.8125rem; color: #0F234C; }
      .lead-shell {
        max-width: 760px;
        margin: 2rem auto;
        padding: 1rem;
      }
      .lead-card {
        background: #fff;
        border: 1px solid #E2E8F0;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(10, 37, 64, 0.08);
      }
      .form-control:focus, .form-select:focus {
        border-color: #00A99D;
        box-shadow: 0 0 0 0.2rem rgba(0, 169, 157, 0.15);
      }
      .btn-primary {
        background: #00A99D; border-color: #00A99D;
        font-family: 'Inter', sans-serif; font-weight: 700;
        border-radius: 6px;
      }
      .btn-primary:hover { background: #008F85; border-color: #008F85; }
      .alert { border-radius: 6px; font-size: 0.875rem; }
    </style>
  </head>
  <body>
    <div class="lead-shell">
      <div class="text-center mb-4">
        <div style="font-family:'Inter',sans-serif;font-weight:700;font-size:1.25rem;color:#fff;letter-spacing:-0.01em">
          <span style="color:#00A99D">&#9672;</span> Bridge Wireless
        </div>
      </div>
      <div class="lead-card p-4 p-lg-5">
        <h1 class="h3 mb-2" style="color:#0F234C">Talk to our wholesale team</h1>
        <p class="mb-4" style="color:#555">Tell us what models or categories you need and our sales team will reach out.</p>
        <div id="message" class="mb-3"></div>
        <form id="lead-form" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="first_name">First Name</label>
              <input class="form-control" id="first_name" name="first_name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="last_name">Last Name</label>
              <input class="form-control" id="last_name" name="last_name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" name="email" type="email" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="phone">Phone</label>
              <input class="form-control" id="phone" name="phone">
            </div>
            <div class="col-12">
              <label class="form-label" for="company_name">Company</label>
              <input class="form-control" id="company_name" name="company_name">
            </div>
            <div class="col-12">
              <label class="form-label" for="interest">What are you looking for?</label>
              <textarea class="form-control" id="interest" name="interest" rows="5"></textarea>
            </div>
          </div>
          <button class="btn btn-primary mt-4" type="submit">Submit</button>
        </form>
      </div>
      <p class="text-center mt-4" style="color:rgba(255,255,255,0.4);font-size:0.75rem">Bridge Wireless &copy; 2026</p>
    </div>

    <script>
      const form = document.getElementById("lead-form");
      const message = document.getElementById("message");
      const mountPath = window.location.pathname.replace(/\/lead-form\/?$/, "");
      const endpoint = `${mountPath}/api/leads`;

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.innerHTML = "";

        const payload = Object.fromEntries(new FormData(form).entries());
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => ({ ok: false, errors: { form: "Unexpected response" } }));
        if (response.ok && data.ok) {
          message.innerHTML = '<div class="alert alert-success">Thanks. Our team will reach out shortly.</div>';
          form.reset();
          return;
        }

        const errors = data.errors || { form: "Unable to submit your request right now." };
        const list = Object.values(errors).map((item) => `<li>${item}</li>`).join("");
        message.innerHTML = `<div class="alert alert-danger mb-0"><ul class="mb-0 ps-3">${list}</ul></div>`;
      });
    </script>
  </body>
</html>
