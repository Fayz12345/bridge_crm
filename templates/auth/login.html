<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0A2540">
    <title>Login | {{ config.APP_NAME }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=visibility,visibility_off" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
  </head>
  <body class="login-shell d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
          <div class="text-center mb-4">
            <div style="font-family:'Inter',sans-serif;font-weight:700;font-size:1.5rem;color:#fff;letter-spacing:-0.01em">
              <span style="color:var(--crm-teal)">&#9672;</span> Bridge CRM
            </div>
            <p class="mt-2 mb-0" style="color:rgba(255,255,255,0.5);font-size:0.8125rem">Bridge Wireless</p>
          </div>
          <div class="crm-card shadow-lg">
            <div class="card-body p-4 p-lg-5">
              <h1 class="h4 mb-1 text-center">Welcome Back</h1>
              <p class="text-center mb-4" style="color:var(--crm-text-secondary);font-size:0.875rem">Sign in to your account</p>

              {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                  <div class="mb-3">
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
                    {% endfor %}
                  </div>
                {% endif %}
              {% endwith %}

              <form method="post" novalidate>
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                  <label class="form-label" for="email">Email</label>
                  <input class="form-control" id="email" name="email" type="email" autocomplete="username" required>
                </div>
                <div class="mb-4">
                  <label class="form-label" for="password">Password</label>
                  <div class="input-group">
                    <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                    <button class="btn btn-outline-secondary password-toggle" type="button" data-target="password" tabindex="-1">
                      <span class="material-symbols-outlined" style="font-size:18px;vertical-align:middle">visibility</span>
                    </button>
                  </div>
                </div>
                <button class="btn btn-primary w-100" type="submit">Sign In</button>
              </form>
            </div>
          </div>
          <p class="text-center mt-4" style="color:rgba(255,255,255,0.4);font-size:0.75rem">Bridge Wireless &copy; 2026</p>
        </div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
